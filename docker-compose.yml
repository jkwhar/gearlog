services:
  carlog-api:
    image: ghcr.io/jkwhar/gearlog:latest
    environment:
      - PORT=5000
      # Set AUTH_TOKEN to require a bearer token from the PWA (leave empty to disable).
      # - AUTH_TOKEN=yourSecret
    volumes:
      - ./api/data:/app/data
    ports:
      - "5000:5000"
    restart: unless-stopped

  carlog-pwa:
    image: ghcr.io/jkwhar/gearlog-pwa:latest
    ports:
      - "80:80"
    restart: unless-stopped
